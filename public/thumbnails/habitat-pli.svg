<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Dark retro background -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="80" cy="40" r="1.5" fill="#fff" fill-opacity="0.6"/>
  <circle cx="200" cy="25" r="1" fill="#fff" fill-opacity="0.4"/>
  <circle cx="350" cy="55" r="1.5" fill="#fff" fill-opacity="0.5"/>
  <circle cx="500" cy="30" r="1" fill="#fff" fill-opacity="0.3"/>
  <circle cx="560" cy="65" r="1.5" fill="#fff" fill-opacity="0.5"/>
  <circle cx="140" cy="70" r="1" fill="#fff" fill-opacity="0.4"/>
  <circle cx="450" cy="15" r="1" fill="#fff" fill-opacity="0.6"/>
  <!-- Ground -->
  <rect x="0" y="260" width="640" height="100" fill="#1a3a1a" fill-opacity="0.8"/>
  <rect x="0" y="258" width="640" height="4" fill="#2d5a2d" fill-opacity="0.6"/>
  <!-- Game area frame -->
  <rect x="120" y="80" width="400" height="200" rx="2" fill="#0a0a1a" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Grid floor -->
  <line x1="120" y1="200" x2="520" y2="200" stroke="#333" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="120" y1="230" x2="520" y2="230" stroke="#333" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="120" y1="260" x2="520" y2="260" stroke="#333" stroke-opacity="0.3" stroke-width="0.5"/>
  <!-- Avatar @ symbol -->
  <text x="250" y="230" font-family="monospace" font-size="28" font-weight="bold" fill="#00ff88" fill-opacity="0.9">@</text>
  <text x="237" y="250" font-family="monospace" font-size="8" fill="#00ff88" fill-opacity="0.6">Player</text>
  <!-- Door + -->
  <text x="400" y="200" font-family="monospace" font-size="24" font-weight="bold" fill="#ffaa00" fill-opacity="0.8">+</text>
  <text x="393" y="215" font-family="monospace" font-size="7" fill="#ffaa00" fill-opacity="0.5">Door</text>
  <!-- Sign ! -->
  <text x="180" y="180" font-family="monospace" font-size="20" font-weight="bold" fill="#ff6b6b" fill-opacity="0.8">!</text>
  <!-- ATM $ -->
  <text x="340" y="230" font-family="monospace" font-size="22" font-weight="bold" fill="#ffd700" fill-opacity="0.8">$</text>
  <text x="335" y="248" font-family="monospace" font-size="7" fill="#ffd700" fill-opacity="0.5">ATM</text>
  <!-- Vendo V -->
  <text x="460" y="230" font-family="monospace" font-size="22" font-weight="bold" fill="#66ccff" fill-opacity="0.8">V</text>
  <!-- Chat bubble -->
  <rect x="260" y="155" width="140" height="20" rx="4" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="275" y="169" font-family="monospace" font-size="8" fill="#ccc" fill-opacity="0.7">Hello, Habitat!</text>
  <!-- Status bar -->
  <rect x="120" y="80" width="400" height="20" fill="#1a1a2e" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="0.5"/>
  <text x="135" y="93" font-family="monospace" font-size="8" fill="#8b5cf6" fill-opacity="0.7">HP:100</text>
  <text x="210" y="93" font-family="monospace" font-size="8" fill="#ffd700" fill-opacity="0.7">Tokens:500</text>
  <text x="320" y="93" font-family="monospace" font-size="8" fill="#66ccff" fill-opacity="0.7">Town Square</text>
  <!-- Title -->
  <text x="320" y="320" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#8b5cf6" fill-opacity="0.7">HABITAT — 1986</text>
  <text x="320" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#666" fill-opacity="0.6">PL/I → Python + React</text>
  <!-- Side panel hint -->
  <rect x="540" y="90" width="80" height="180" rx="4" fill="#1a1a2e" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="555" y="110" font-family="monospace" font-size="7" fill="#8b5cf6" fill-opacity="0.5">INVENTORY</text>
  <rect x="550" y="118" width="60" height="12" rx="2" fill="#8b5cf6" fill-opacity="0.06"/>
  <rect x="550" y="135" width="60" height="12" rx="2" fill="#8b5cf6" fill-opacity="0.06"/>
  <rect x="550" y="152" width="60" height="12" rx="2" fill="#8b5cf6" fill-opacity="0.06"/>
  <!-- Mini map hint -->
  <rect x="20" y="90" width="80" height="70" rx="4" fill="#1a1a2e" stroke="#8b5cf6" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="35" y="107" font-family="monospace" font-size="7" fill="#8b5cf6" fill-opacity="0.5">MAP</text>
  <circle cx="50" cy="130" r="3" fill="#00ff88" fill-opacity="0.4"/>
  <circle cx="70" cy="120" r="3" fill="#8b5cf6" fill-opacity="0.3"/>
  <circle cx="40" cy="145" r="3" fill="#ffd700" fill-opacity="0.3"/>
  <line x1="50" y1="130" x2="70" y2="120" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="0.5"/>
  <line x1="50" y1="130" x2="40" y2="145" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="0.5"/>
</svg>