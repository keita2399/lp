<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#a78bfa">BtoB MATCHING SAAS ARCHITECTURE</text>

  <!-- Stats bar -->
  <rect x="180" y="50" width="120" height="24" rx="12" fill="#7c3aed" opacity="0.3"/>
  <text x="240" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">32 Screens</text>
  <rect x="310" y="50" width="120" height="24" rx="12" fill="#7c3aed" opacity="0.3"/>
  <text x="370" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">67 APIs</text>
  <rect x="440" y="50" width="120" height="24" rx="12" fill="#7c3aed" opacity="0.3"/>
  <text x="500" y="66" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd">19 Models</text>

  <!-- Frontend Layer -->
  <rect x="30" y="90" width="740" height="70" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="50" y="112" font-family="monospace" font-size="11" fill="#64748b">FRONTEND</text>
  <rect x="50" y="120" width="90" height="28" rx="6" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
  <text x="95" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">Next.js 14</text>
  <rect x="150" y="120" width="80" height="28" rx="6" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="190" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">TypeScript</text>
  <rect x="240" y="120" width="80" height="28" rx="6" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
  <text x="280" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#67e8f9">Tailwind</text>
  <rect x="330" y="120" width="100" height="28" rx="6" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">Google Maps</text>
  <rect x="440" y="120" width="50" height="28" rx="6" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="465" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#fcd34d">PWA</text>
  <rect x="500" y="120" width="60" height="28" rx="6" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
  <text x="530" y="138" text-anchor="middle" font-family="monospace" font-size="10" fill="#f9a8d4">Chat</text>

  <!-- Arrow down -->
  <line x1="400" y1="160" x2="400" y2="175" stroke="#475569" stroke-width="1.5"/>
  <polygon points="395,175 405,175 400,182" fill="#475569"/>

  <!-- API Layer -->
  <rect x="30" y="185" width="740" height="70" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="50" y="207" font-family="monospace" font-size="11" fill="#64748b">API LAYER (67 endpoints)</text>
  <rect x="50" y="215" width="70" height="28" rx="6" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="85" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5">Auth</text>
  <rect x="130" y="215" width="90" height="28" rx="6" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="175" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#fdba74">Matching</text>
  <rect x="230" y="215" width="80" height="28" rx="6" fill="#eab308" opacity="0.2" stroke="#eab308" stroke-width="1"/>
  <text x="270" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#fde047">Payment</text>
  <rect x="320" y="215" width="70" height="28" rx="6" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="355" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">Admin</text>
  <rect x="400" y="215" width="60" height="28" rx="6" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
  <text x="430" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#67e8f9">Mail</text>
  <rect x="470" y="215" width="60" height="28" rx="6" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="500" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">Cron</text>
  <rect x="540" y="215" width="80" height="28" rx="6" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
  <text x="580" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#f9a8d4">AI Judge</text>

  <!-- Arrow down -->
  <line x1="400" y1="255" x2="400" y2="270" stroke="#475569" stroke-width="1.5"/>
  <polygon points="395,270 405,270 400,277" fill="#475569"/>

  <!-- Data & External Layer -->
  <rect x="30" y="280" width="355" height="70" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="50" y="302" font-family="monospace" font-size="11" fill="#64748b">DATA (19 models)</text>
  <rect x="50" y="310" width="80" height="28" rx="6" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="90" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">Prisma</text>
  <rect x="140" y="310" width="100" height="28" rx="6" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
  <text x="190" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#67e8f9">PostgreSQL</text>
  <rect x="250" y="310" width="90" height="28" rx="6" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="295" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#c4b5fd">Blob Store</text>

  <rect x="415" y="280" width="355" height="70" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="435" y="302" font-family="monospace" font-size="11" fill="#64748b">EXTERNAL SERVICES</text>
  <rect x="435" y="310" width="60" height="28" rx="6" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="465" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">LINE</text>
  <rect x="505" y="310" width="80" height="28" rx="6" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="545" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#fcd34d">Gemini AI</text>
  <rect x="595" y="310" width="80" height="28" rx="6" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="635" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#fca5a5">Payment</text>
  <rect x="685" y="310" width="60" height="28" rx="6" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
  <text x="715" y="328" text-anchor="middle" font-family="monospace" font-size="10" fill="#f9a8d4">SMTP</text>

  <!-- Infrastructure bar -->
  <rect x="30" y="365" width="740" height="40" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="50" y="390" font-family="monospace" font-size="11" fill="#64748b">INFRA</text>
  <rect x="100" y="375" width="70" height="22" rx="6" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="135" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">Vercel</text>
  <rect x="180" y="375" width="80" height="22" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="0.5"/>
  <text x="220" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">Neon DB</text>
  <rect x="270" y="375" width="90" height="22" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="315" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">Cookie Auth</text>
  <rect x="370" y="375" width="100" height="22" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="420" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#fcd34d">HMAC-SHA256</text>
  <rect x="480" y="375" width="90" height="22" rx="6" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="0.5"/>
  <text x="525" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#67e8f9">Cron Batch</text>
  <rect x="580" y="375" width="80" height="22" rx="6" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="0.5"/>
  <text x="620" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#f9a8d4">Webhook</text>

  <!-- Connection lines between layers -->
  <line x1="200" y1="255" x2="200" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="255" x2="600" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="400" y="432" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Built by one person in 3 months — continuously expanding</text>
</svg>