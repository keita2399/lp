<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06c755;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#06c755;stop-opacity:0.03"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <!-- Phone frame -->
  <rect x="400" y="30" width="180" height="300" rx="20" fill="#fff" stroke="#06c755" stroke-opacity="0.2" stroke-width="2"/>
  <rect x="445" y="40" width="90" height="6" rx="3" fill="#06c755" fill-opacity="0.1"/>
  <!-- Chat header -->
  <rect x="410" y="56" width="160" height="30" fill="#06c755" fill-opacity="0.1"/>
  <text x="490" y="75" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="600" fill="#06c755" fill-opacity="0.6">通知デモBot</text>
  <!-- Chat bubbles -->
  <rect x="420" y="100" width="120" height="30" rx="12" fill="#06c755" fill-opacity="0.12"/>
  <rect x="430" y="110" width="80" height="6" rx="2" fill="#06c755" fill-opacity="0.2"/>
  <rect x="440" y="145" width="110" height="30" rx="12" fill="#06c755" fill-opacity="0.12"/>
  <rect x="450" y="155" width="70" height="6" rx="2" fill="#06c755" fill-opacity="0.2"/>
  <rect x="420" y="190" width="130" height="45" rx="12" fill="#06c755" fill-opacity="0.12"/>
  <rect x="435" y="200" width="50" height="25" rx="4" fill="#06c755" fill-opacity="0.08"/>
  <text x="460" y="217" text-anchor="middle" font-family="system-ui" font-size="14">😀</text>
  <!-- Send form (left panel) -->
  <rect x="40" y="50" width="300" height="260" rx="8" fill="#fff" stroke="#06c755" stroke-opacity="0.15" stroke-width="1"/>
  <text x="60" y="80" font-family="system-ui" font-size="11" font-weight="600" fill="#333" fill-opacity="0.6">メッセージ送信</text>
  <!-- Type buttons -->
  <rect x="60" y="100" width="70" height="26" rx="4" fill="#06c755" fill-opacity="0.15"/>
  <text x="95" y="117" text-anchor="middle" font-family="system-ui" font-size="9" fill="#06c755" fill-opacity="0.7">テキスト</text>
  <rect x="140" y="100" width="60" height="26" rx="4" fill="#06c755" fill-opacity="0.06" stroke="#06c755" stroke-opacity="0.15" stroke-width="1"/>
  <text x="170" y="117" text-anchor="middle" font-family="system-ui" font-size="9" fill="#06c755" fill-opacity="0.4">画像</text>
  <rect x="210" y="100" width="70" height="26" rx="4" fill="#06c755" fill-opacity="0.06" stroke="#06c755" stroke-opacity="0.15" stroke-width="1"/>
  <text x="245" y="117" text-anchor="middle" font-family="system-ui" font-size="9" fill="#06c755" fill-opacity="0.4">スタンプ</text>
  <!-- Input -->
  <rect x="60" y="145" width="260" height="60" rx="4" fill="#06c755" fill-opacity="0.03" stroke="#06c755" stroke-opacity="0.12" stroke-width="1"/>
  <text x="75" y="170" font-family="system-ui" font-size="10" fill="#999" fill-opacity="0.5">メッセージを入力...</text>
  <!-- Send button -->
  <rect x="60" y="225" width="260" height="36" rx="4" fill="#06c755" fill-opacity="0.8"/>
  <text x="190" y="248" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#fff">送信</text>
  <!-- Arrow -->
  <text x="365" y="185" text-anchor="middle" font-family="system-ui" font-size="20" fill="#06c755" fill-opacity="0.4">→</text>
</svg>